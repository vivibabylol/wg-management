<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Western Green LLC — Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --surface3: #21262d;
  --border: #30363d;
  --border2: #3d444d;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --text-dim: #484f58;
  --green: #3fb950;
  --green-dim: #1a3a22;
  --green-glow: rgba(63,185,80,0.15);
  --blue: #58a6ff;
  --blue-dim: #1a2a40;
  --amber: #d29922;
  --amber-dim: #2d2208;
  --red: #f85149;
  --red-dim: #3a1a1a;
  --purple: #a371f7;
  --purple-dim: #1e1530;
  --teal: #39d3c3;
  --teal-dim: #0d2825;
  --orange: #f0883e;
  --orange-dim: #2d1a08;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
  --display: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  height: 56px; padding: 0 20px; gap: 4px;
}

.nav-logo {
  font-family: var(--display);
  font-size: 0.95rem; font-weight: 800;
  color: var(--green);
  letter-spacing: -0.02em;
  margin-right: 20px;
  white-space: nowrap;
}

.nav-logo span { color: var(--text-muted); font-weight: 400; }

.nav-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 6px 14px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 0.8rem; font-weight: 500;
  color: var(--text-muted);
  background: none; border: none;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.nav-tab:hover { background: var(--surface3); color: var(--text); }
.nav-tab.active { background: var(--surface2); color: var(--text); }
.nav-tab .tab-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

/* ── MAIN ── */
main { padding-top: 56px; }
.page { display: none; padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
.page.active { display: block; }

/* ── PAGE HEADER ── */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
}
.page-title {
  font-family: var(--display);
  font-size: 1.6rem; font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
}
.page-title span { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; display: block; margin-top: 4px; }

.btn-add {
  background: var(--green);
  color: #000;
  border: none; border-radius: 8px;
  padding: 9px 18px;
  font-family: var(--sans); font-size: 0.85rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.btn-add:hover { background: #4cc95e; transform: translateY(-1px); }

/* ── STAT CARDS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-card-val {
  font-family: var(--mono);
  font-size: 1.4rem; font-weight: 500;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card-lbl {
  font-size: 0.72rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
}

/* ── CARDS LIST ── */
.cards-list { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 2px 2px 0;
}
.card:hover { border-color: var(--border2); background: var(--surface2); transform: translateX(2px); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.card-id {
  font-family: var(--mono); font-size: 0.75rem;
  color: var(--text-muted);
}
.card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.card-field { display: flex; flex-direction: column; gap: 2px; }
.card-field-lbl { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.card-field-val { font-size: 0.82rem; font-family: var(--mono); }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 0.72rem; font-weight: 600; white-space: nowrap;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-teal { background: var(--teal-dim); color: var(--teal); }
.badge-muted { background: var(--surface3); color: var(--text-muted); }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: flex-end; justify-content: center;
  padding: 0;
}
@media (min-width: 640px) {
  .modal-overlay { align-items: center; padding: 20px; }
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  width: 100%; max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@media (min-width: 640px) {
  .modal { border-radius: 16px; max-width: 560px; }
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 12px auto 0;
}
@media (min-width: 640px) { .modal-handle { display: none; } }

.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--display); font-size: 1.1rem; font-weight: 700; }
.modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 1.1rem; cursor: pointer; padding: 4px;
  border-radius: 6px; transition: color 0.15s;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 16px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
input, select, textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px;
  font-family: var(--sans); font-size: 0.875rem; color: var(--text);
  outline: none; transition: border-color 0.15s; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }
textarea { resize: vertical; min-height: 70px; }
select option { background: var(--surface2); }

.btn-save {
  background: var(--green); color: #000; border: none;
  padding: 9px 22px; border-radius: 8px;
  font-family: var(--sans); font-size: 0.875rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.btn-save:hover { background: #4cc95e; }
.btn-cancel {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  padding: 9px 18px; border-radius: 8px;
  font-family: var(--sans); font-size: 0.875rem; cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
.btn-delete {
  background: none; border: 1px solid var(--red); color: var(--red);
  padding: 9px 18px; border-radius: 8px;
  font-family: var(--sans); font-size: 0.875rem; cursor: pointer;
  margin-right: auto; transition: all 0.15s;
}
.btn-delete:hover { background: var(--red-dim); }

/* ── SECTION DIVIDER ── */
.section-label {
  font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 16px 0 8px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── TASK SPECIFIC ── */
.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: all 0.15s;
}
.task-item:hover { border-color: var(--border2); }
.task-item.done { opacity: 0.5; }
.task-check {
  width: 18px; height: 18px; border-radius: 5px;
  border: 2px solid var(--border2);
  background: none; cursor: pointer;
  flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task-check.checked { background: var(--green); border-color: var(--green); }
.task-check.checked::after { content: '✓'; font-size: 0.7rem; color: #000; font-weight: 700; }
.task-content { flex: 1; }
.task-text { font-size: 0.9rem; margin-bottom: 3px; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text-muted); }
.task-meta { font-size: 0.75rem; color: var(--text-muted); }
.task-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 4px; }
.task-del:hover { color: var(--red); background: var(--red-dim); }

.week-header {
  font-family: var(--display); font-size: 1rem; font-weight: 700;
  color: var(--text); margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.week-badge {
  font-size: 0.7rem; font-weight: 500; font-family: var(--sans);
  padding: 2px 8px; border-radius: 8px;
  background: var(--surface3); color: var(--text-muted);
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 48px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-text { font-size: 0.9rem; margin-bottom: 6px; }
.empty-sub { font-size: 0.8rem; color: var(--text-dim); }

/* ── DASHBOARD ── */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 18px;
}
.dash-card-title {
  font-family: var(--display); font-size: 0.85rem; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.dash-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.dash-list-item:last-child { border-bottom: none; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── INVOICE SPECIFIC ── */
.invoice-card::before { background: var(--teal); }
.container-card::before { background: var(--blue); }
.delivery-card::before { background: var(--purple); }

.progress-bar {
  height: 4px; background: var(--surface3); border-radius: 2px;
  margin-top: 10px; overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

/* ── CHECKBOX DELIVERY ── */
.delivery-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border2);
  background: none; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 0.8rem;
}
.delivery-check.delivered { background: var(--green); border-color: var(--green); color: #000; }

/* mobile grid fix */
@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .card-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div id="auth-overlay" style="position:fixed;inset:0;background:#0d1117;z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;width:100%;max-width:360px;text-align:center">
    <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#3fb950;margin-bottom:6px">WG LLC</div>
    <div style="font-size:0.82rem;color:#7d8590;margin-bottom:28px">Operations Management</div>
    <input type="password" id="auth-input" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')checkAuth()"
      style="width:100%;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:11px 14px;font-size:0.95rem;color:#e6edf3;outline:none;text-align:center;margin-bottom:12px;box-sizing:border-box">
    <button onclick="checkAuth()"
      style="width:100%;background:#3fb950;color:#000;border:none;border-radius:8px;padding:11px;font-size:0.9rem;font-weight:700;cursor:pointer">
      登入
    </button>
    <div id="auth-error" style="color:#f85149;font-size:0.8rem;margin-top:10px;display:none">密碼錯誤，請再試一次</div>
  </div>
</div>

<script>
(function() {
  const KEY = 'wg_auth_ok';
  const PWD = 'WGwraps168';
  if (localStorage.getItem(KEY) === '1') {
    document.getElementById('auth-overlay').style.display = 'none';
  }
  window.checkAuth = function() {
    const val = document.getElementById('auth-input').value;
    if (val === PWD) {
      localStorage.setItem(KEY, '1');
      document.getElementById('auth-overlay').style.display = 'none';
    } else {
      document.getElementById('auth-error').style.display = 'block';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  };
})();
</script>

// ── Sync indicator ──
function showSync(msg, color) {
  let el = document.getElementById('sync-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-indicator';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:999;padding:8px 16px;border-radius:8px;font-size:0.78rem;font-family:var(--mono);transition:all 0.3s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = color || 'var(--surface2)';
  el.style.color = 'var(--text)';
  el.style.border = '1px solid var(--border)';
  el.style.opacity = '1';
}
function hideSync() {
  const el = document.getElementById('sync-indicator');
  if (el) { el.style.opacity = '0'; }
}

// ── Fetch all data from Google Sheets ──
async function loadAll() {
  showSync('⟳ 載入中…');
  try {
    const sheets = ['Shipments','Invoices','Deliveries','Tasks','Customers','Settings'];
    const results = await Promise.all(sheets.map(s =>
      fetch(`${API}?sheet=${s}`).then(r => r.json())
    ));
    cargo      = results[0].data || [];
    invoices   = results[1].data || [];
    deliveries = (results[2].data || []).map(d => {
      if (d.bolNum !== undefined) d.bolNum = String(d.bolNum).trim();
      ['delivDate'].forEach(f => { d[f] = normalizeDate(d[f]); });
      return d;
    });
    tasks      = results[3].data || [];
    customers  = results[4].data || [];
    // Load settings from Sheets
    const rawSets = results[5]?.data || [];
    if (rawSets.length) {
      const merged = {};
      rawSets.forEach(r => { try { merged[r.key] = JSON.parse(r.value); } catch{} });
      Object.keys(DEFAULT_LISTS).forEach(k => { if (!merged[k]) merged[k] = DEFAULT_LISTS[k]; });
    }

    // normalize booleans for tasks
    tasks = tasks.map(t => ({ ...t, done: t.done === true || t.done === 'TRUE' || t.done === 'true' }));

    showSync('✓ 已同步', 'var(--green-dim)');
    setTimeout(hideSync, 2000);
    renderAll();
  } catch(e) {
    showSync('⚠ 無法連線', 'var(--red-dim)');
    console.error(e);
  }
}

// ── Save single record to Google Sheets ──
async function saveToSheet(sheet, record) {
  showSync('⟳ 儲存中…');
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ sheet, action: 'save', record }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    showSync('✓ 已儲存', 'var(--green-dim)');
    setTimeout(hideSync, 1500);
    return true;
  } catch(e) {
    showSync('⚠ 儲存失敗', 'var(--red-dim)');
    console.error(e);
    return false;
  }
}

// ── Delete record from Google Sheets ──
async function deleteFromSheet(sheet, id) {
  showSync('⟳ 刪除中…');
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ sheet, action: 'delete', record: { id } }),
    });
    showSync('✓ 已刪除', 'var(--green-dim)');
    setTimeout(hideSync, 1500);
    return true;
  } catch(e) {
    showSync('⚠ 刪除失敗', 'var(--red-dim)');
    return false;
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function fmt$(n) { if (!n) return '—'; return '$' + Number(n).toLocaleString('en-US'); }
function fmtPhone(p) {
  if (!p) return '';
  const d = String(p).replace(/\D/g,'');
  if (d.length === 10) return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6);
  if (d.length === 11 && d[0]==='1') return '+1 (' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
  return String(p); // return as-is if can't parse
}
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).trim();
  if (!s || s === 'Invalid Date' || s === '0') return '—';
  try {
    const dt = new Date(s + (s.includes('T') ? '' : 'T12:00:00'));
    if (isNaN(dt.getTime())) return '—';
    return dt.toLocaleDateString('zh-TW', {month:'short', day:'numeric'});
  } catch(e) { return '—'; }
}
function daysFromNow(d) {
  if (!d) return null;
  const diff = Math.round((new Date(d+'T12:00:00') - new Date()) / 86400000);
  return diff;
}

  '\u6d77\u904b\u4e2d':    { cls:'badge-blue',   step:1 },
  '\u5230\u6e2f\u5f85\u6e05\u95dc': { cls:'badge-amber',  step:2 },
  '\u6e05\u95dc\u4e2d':    { cls:'badge-amber',  step:3 },
  '\u5f85\u914d\u9001':    { cls:'badge-purple', step:4 },
  '\u5df2\u5b8c\u6210':    { cls:'badge-green',  step:5 },
};

const DOC_STEPS = [
  { key:'doc_debitNote',       label:'Debit Note \u6536\u5230',           ref:'ref_debitNote',     date:'date_debitNote' },
  { key:'doc_arrivalNotice',   label:'Arrival Notice \u6536\u5230',       ref:'ref_arrivalNotice', date:'date_arrivalNotice' },
  { key:'doc_carrierFeePaid',  label:'Carrier Fee \u5df2\u4ed8',          ref:'',                  date:'' },
  { key:'doc_packingList',     label:'Packing List \u5df2\u63d0\u4f9b',   ref:'',                  date:'' },
  { key:'doc_commercialInv',   label:'Commercial Invoice \u5df2\u63d0\u4f9b', ref:'',              date:'' },
  { key:'doc_entrySummary',    label:'Entry Summary \u6536\u5230',        ref:'ref_entrySummary',  date:'date_entrySummary' },
  { key:'doc_finalAddress',    label:'\u6700\u7d42\u5730\u5740\u5df2\u63d0\u4f9b',               ref:'',                  date:'' },
  { key:'doc_inlandBOL',       label:'Inland BOL \u6536\u5230',           ref:'ref_inlandBOL',     date:'date_inlandBOL' },
  { key:'doc_customerNotified',label:'\u5df2\u901a\u77e5\u5ba2\u6236 Enroute',                    ref:'',                  date:'' },

function isTrue(v) { return v===true||v==='TRUE'||v==='true'||v===1||v==='1'; }

// Normalize date values from Google Sheets
function normalizeDate(v) {
  if (!v) return '';
  if (v instanceof Date) {
    if (isNaN(v.getTime())) return '';
    return v.getFullYear() + '-' + String(v.getMonth()+1).padStart(2,'0') + '-' + String(v.getDate()).padStart(2,'0');
  }
  const s = String(v).trim();
  if (!s || s === '0' || s === 'Invalid Date' || s === 'NaN') return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Google Sheets serial number (days since Dec 30 1899)
  if (/^\d{5}$/.test(s)) {
    const epoch = new Date(1899, 11, 30);
    epoch.setDate(epoch.getDate() + parseInt(s));
    if (!isNaN(epoch.getTime())) return epoch.getFullYear() + '-' + String(epoch.getMonth()+1).padStart(2,'0') + '-' + String(epoch.getDate()).padStart(2,'0');
  }
  try {
    const d = new Date(s);
    if (!isNaN(d.getTime()) && d.getFullYear() > 1970) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
  } catch(e) {}
  return '';
}


function renderCargoStats() {
  const active = cargo.filter(s => s.status !== '\u5df2\u5b8c\u6210').length;
  const atPort = cargo.filter(s => ['\u5230\u6e2f\u5f85\u6e05\u95dc','\u6e05\u95dc\u4e2d'].includes(s.status)).length;
  const done   = cargo.filter(s => s.status === '\u5df2\u5b8c\u6210').length;
  const ctrs   = cargo.reduce((s,sh) => s + (sh.containers||'').split(',').map(x=>x.trim()).filter(Boolean).length, 0);
  const el = document.getElementById('cargo-stats');
  if (!el) return;
  el.innerHTML =
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--blue)">' + cargo.length + '</div><div class="stat-card-lbl">\u7e3d\u8ca8\u6279</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--teal)">' + ctrs + '</div><div class="stat-card-lbl">\u7e3d\u8ca8\u6ac3</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--amber)">' + atPort + '</div><div class="stat-card-lbl">\u5230\u6e2f/\u6e05\u95dc\u4e2d</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--green)">' + done + '</div><div class="stat-card-lbl">\u5df2\u5b8c\u6210</div></div>';
}

function renderCargo() {
  renderCargoStats();
  const el = document.getElementById('cargo-list');
  if (!cargo.length) { el.innerHTML = emptyState('\U0001f6a2','\u5c1a\u7121\u8ca8\u6279\u8cc7\u6599','\u9ede\u64ca\u65b0\u589e\u8ca8\u6279\u958b\u59cb\u8ffd\u8e64'); return; }
  const sorted = [...cargo].sort((a,b) => (SHIP_STATUS[a.status]?.step??0)-(SHIP_STATUS[b.status]?.step??0));
  let html = '';
  sorted.forEach(s => {
    const st      = SHIP_STATUS[s.status]||{cls:'badge-muted'};
    const ctrs    = (s.containers||'').split(',').map(x=>x.trim()).filter(Boolean);
    const doneN   = DOC_STEPS.filter(d=>isTrue(s[d.key])).length;
    const pct     = Math.round(doneN/DOC_STEPS.length*100);
    const etaDays = daysFromNow(s.eta);
    const profit  = (Number(s.sellPrice)||0)-(Number(s.mfgCost)||0)-(Number(s.freight)||0)
                   -(Number(s.trucking)||0)-(Number(s.customs)||0)-(Number(s.isf)||0)
                   -(Number(s.courier)||0)-(Number(s.chassis)||0)-(Number(s.bankCharge)||0);
    const nextDoc = DOC_STEPS.find(d=>!isTrue(s[d.key]));

    let etaTag = '';
    if (etaDays!==null && s.status!=='\u5df2\u5b8c\u6210') {
      if (etaDays<0)      etaTag = '<span class="badge badge-red"   style="font-size:0.68rem">\u9065\u671f '+Math.abs(etaDays)+'\u5929</span>';
      else if (etaDays<=5) etaTag = '<span class="badge badge-amber" style="font-size:0.68rem">'+etaDays+'\u5929\u5f8c\u5230\u6e2f</span>';
    }

    // ── Card open ──
    html += '<div class="card container-card" onclick="openCargoEdit(\''+s.id+'\')">'; // [1]

    // ── Top row ──
    html += '<div class="card-top">'; // [2]
      // Left
      html += '<div style="flex:1">'; // [3]
        html += '<div class="card-id">'+(s.carrier||'')+' '+(s.customer?'&middot; '+s.customer:'')+'</div>';
        html += '<div class="card-title" style="font-family:var(--mono)">'+(s.bolNum||'\u2014 BOL \u5f85\u8f38\u5165')+'</div>';
        // Containers with delivery status dots
        if (ctrs.length) {
          html += '<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">';
          ctrs.forEach(ct => {
            const dr = deliveries.find(dd =>
              dd.bolNum && String(dd.bolNum).trim()===String(s.bolNum||'').trim() &&
              dd.containerNum && dd.containerNum.split(',').map(x=>x.trim()).includes(ct)
            );
            const ds = dr ? dr.status : null;
            const dc = ds==='\u5df2\u914d\u9001'?'var(--green)':ds==='\u5df2\u6392\u7a0b'?'var(--blue)':ds?'var(--amber)':'var(--border2)';
            const tip = ds ? ds+(dr.city?' \xb7 '+dr.city:'') : '\u5c1a\u672a\u5206\u914d';
            html += '<span title="'+tip+'" style="font-family:var(--mono);font-size:0.7rem;background:var(--surface2);border:1px solid '+dc+';border-radius:4px;padding:2px 6px;color:'+(ds?'var(--text)':'var(--text-muted)')+'">' +
              '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+dc+';margin-right:4px;vertical-align:middle"></span>'+ct+'</span>';
          });
          html += '</div>';
          const delvd = ctrs.filter(ct => {
            const dr = deliveries.find(dd => dd.bolNum && String(dd.bolNum).trim()===String(s.bolNum||'').trim() && dd.containerNum && dd.containerNum.split(',').map(x=>x.trim()).includes(ct));
            return dr && dr.status==='\u5df2\u914d\u9001';
          }).length;
          html += '<div style="font-size:0.7rem;color:var(--text-muted);margin-top:4px">\u914d\u9001: '+delvd+' / '+ctrs.length+'</div>';
        } else {
          html += '<div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">\u8ca8\u6ac3\u865f\u78bc\u5f85\u8f38\u5165</div>';
        }
      html += '</div>'; // [3] close left
      // Right: badge + eta tag
      html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'; // [4]
        html += '<span class="badge '+st.cls+'">'+s.status+'</span>';
        if (etaTag) html += etaTag;
      html += '</div>'; // [4] close right
    html += '</div>'; // [2] close card-top

    // ── Doc progress ──
    html += '<div style="margin-top:10px">'; // [5]
      html += '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);margin-bottom:4px"><span>\u6587\u4ef6\u9032\u5ea6</span><span>'+doneN+' / '+DOC_STEPS.length+'</span></div>';
      html += '<div style="height:4px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="height:100%;border-radius:2px;background:'+(pct===100?'var(--green)':'var(--blue)')+';width:'+pct+'%"></div></div>';
      if (nextDoc && pct<100) html += '<div style="font-size:0.72rem;color:var(--amber);margin-top:4px">\u25b6 '+nextDoc.label+'</div>';
    html += '</div>'; // [5] close doc progress

    // ── Key numbers ──
    html += '<div class="card-grid" style="margin-top:10px">'; // [6]
      if (s.eta)       html += '<div class="card-field"><div class="card-field-lbl">ETA \u5230\u6e2f</div><div class="card-field-val">'+fmtDate(s.eta)+'</div></div>';
      if (s.etaFinal)  html += '<div class="card-field"><div class="card-field-lbl">\u6700\u7d42\u4ea4\u4ed8</div><div class="card-field-val">'+fmtDate(s.etaFinal)+'</div></div>';
      if (s.sellPrice) html += '<div class="card-field"><div class="card-field-lbl">\u552e\u50f9</div><div class="card-field-val" style="color:var(--teal)">'+fmt$(s.sellPrice)+'</div></div>';
      html += '<div class="card-field"><div class="card-field-lbl">\u5229\u6f64</div><div class="card-field-val" style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+fmt$(profit)+'</div></div>';
    html += '</div>'; // [6] close card-grid

    if (s.dest) html += '<div style="font-size:0.75rem;color:var(--text-muted);margin-top:8px">\U0001f4cd '+s.dest+'</div>';

    html += '</div>'; // [1] close card
  });
  el.innerHTML = html;
}

let editingCargo = null;

function openCargoModal(s) {
  editingCargo = s || null;
  document.getElementById('cargoModalTitle').textContent = s ? '\u7de8\u8f2f\u8ca8\u6279' : '\u65b0\u589e\u8ca8\u6279';
  document.getElementById('cargoDeleteBtn').style.display = s ? 'block' : 'none';
  const docSec = document.getElementById('cargoDocSection');
  if (docSec) docSec.style.display = s ? 'block' : 'none';
  populateCargoDropdowns(s);
  ['bolNum','status','etd','eta','etaFinal','disc','qty','sellPrice','mfgCost','freight','trucking','customs','isf','courier','chassis','bankCharge','dest','notes'].forEach(k => {
    const el = document.getElementById('c-'+k);
    if (el) el.value = s ? (s[k]||'') : (k==='status'?'\u5f85\u51fa\u6e2f':'');
  });
  const cta = document.getElementById('c-containers-ta');
  if (cta) cta.value = s ? (s.containers||'').replace(/,\s*/g,'\n') : '';
  if (s) {
    DOC_STEPS.forEach(d => {
      const cb = document.getElementById('doc-cb-'+d.key);
      if (cb) cb.checked = isTrue(s[d.key]);
      if (d.ref)  { const ri = document.getElementById('doc-ref-'+d.key);  if (ri) ri.value = s[d.ref]||''; }
      if (d.date) { const di = document.getElementById('doc-date-'+d.key); if (di) di.value = s[d.date]||''; }
    });
  }
  document.getElementById('cargoModal').classList.add('open');
}
function openCargoEdit(id) { openCargoModal(cargo.find(x => x.id === id)); }

async function saveCargo() {
  const data = {};
  ['bolNum','status','etd','eta','etaFinal','disc','qty','sellPrice','mfgCost','freight','trucking','customs','isf','courier','chassis','bankCharge','dest','notes'].forEach(k => {
    const el = document.getElementById('c-'+k);
    data[k] = el ? el.value : '';
  });
  ['customer','carrier','pol','pod'].forEach(k => {
    const el = document.getElementById('c-'+k);
    data[k] = el ? el.value : '';
  });
  const cta = document.getElementById('c-containers-ta');
  data.containers = cta ? cta.value.split(/[\n,]/).map(x=>x.trim()).filter(Boolean).join(', ') : '';
  if (!data.bolNum && !data.containers) { alert('\u8acb\u8f38\u5165 BOL \u865f\u78bc\u6216\u8ca8\u6ac3\u865f\u78bc'); return; }
  DOC_STEPS.forEach(d => {
    const cb = document.getElementById('doc-cb-'+d.key);
    data[d.key] = cb ? cb.checked : false;
    if (d.ref)  { const ri = document.getElementById('doc-ref-'+d.key);  data[d.ref]  = ri ? ri.value : ''; }
    if (d.date) { const di = document.getElementById('doc-date-'+d.key); data[d.date] = di ? di.value : ''; }
  });
  const record = editingCargo ? {...editingCargo,...data} : {id:uid(),...data};
  closeModal('cargoModal');
  const ok = await saveToSheet('Shipments', record);
  if (ok) await loadAll();
}

async function deleteCargo() {
  if (!editingCargo || !confirm('\u78ba\u5b9a\u522a\u9664\u6b64\u8ca8\u6279\uff1f')) return;
  closeModal('cargoModal');
  const ok = await deleteFromSheet('Shipments', editingCargo.id);
  if (ok) await loadAll();
}

  if (!bolVal) { box.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim)">先選擇 BOL</span>'; return; }
  const shipment = cargo.find(s => String(s.bolNum||'').trim() === bolVal);
  const ctrs = shipment ? (shipment.containers||'').split(/[,\n]/).map(x=>x.trim()).filter(Boolean) : [];
  if (!ctrs.length) { box.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim)">此 BOL 尚無貨櫃號碼（請先在貨批頁面填入）</span>'; return; }
  const currentId = editingDelivery ? editingDelivery.id : null;
  const usedByOthers = new Set(
    deliveries
      .filter(del => del.id !== currentId && String(del.bolNum||'').trim() === bolVal && del.containerNum)
      .flatMap(del => del.containerNum.split(',').map(x=>x.trim()).filter(Boolean))
  );
  box.innerHTML = ctrs.map(ct => {
    const isUsed = usedByOthers.has(ct);
    return '<label style="display:inline-flex;align-items:center;gap:6px;background:'+(isUsed?'var(--surface3)':'var(--surface2)')+';border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:'+(isUsed?'default':'pointer')+';font-size:0.82rem;font-family:var(--mono);opacity:'+(isUsed?'0.45':'1')+'">' +
      '<input type="checkbox" name="d-ctr" value="'+ct+'"'+(isUsed?' disabled':'')+' style="accent-color:var(--green);width:14px;height:14px"> ' +
      ct + (isUsed?' <span style="font-size:0.65rem;color:var(--text-muted)">已配送</span>':'') + '</label>';
  }).join('');
}

function openDeliveryModal(d) {
  editingDelivery = d || null;
  document.getElementById('deliveryModalTitle').textContent = d ? '編輯配送' : '新增配送';
  document.getElementById('deliveryDeleteBtn').style.display = d ? 'block' : 'none';

  // BOL dropdown
  const bolSel = document.getElementById('d-bolNum');
  if (bolSel) {
    const bols = [...new Set(cargo.filter(s=>s.bolNum).map(s=>String(s.bolNum).trim()))].filter(Boolean).sort();
    bolSel.innerHTML = '<option value="">— 選擇 BOL —</option>' +
      bols.map(b => '<option value="'+b+'"'+(d&&String(d.bolNum||'').trim()===b?' selected':'')+'>'+b+'</option>').join('');
  }

  // Container checkboxes
  const box = document.getElementById('d-container-checks');
  if (box) {
    if (d && d.bolNum) {
      const shipment = cargo.find(s => String(s.bolNum||'').trim() === String(d.bolNum||'').trim());
      const ctrs = shipment ? (shipment.containers||'').split(',').map(x=>x.trim()).filter(Boolean) : [];
      const selected = (d.containerNum||'').split(',').map(x=>x.trim()).filter(Boolean);
      box.innerHTML = ctrs.length ? ctrs.map(ct =>
        '<label style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:0.82rem;font-family:var(--mono)">' +
        '<input type="checkbox" name="d-ctr" value="'+ct+'"'+(selected.includes(ct)?' checked':'')+' style="accent-color:var(--green);width:14px;height:14px"> '+ct+'</label>'
      ).join('') : '<span style="font-size:0.8rem;color:var(--text-dim)">此 BOL 尚無貨櫃號碼</span>';
    } else {
      box.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim)">先選擇 BOL</span>';
    }
  }

  populateDeliveryDropdowns(d);
  // Re-populate company dropdown after type is set
  if (d && d.dist) {
    const bizSel = document.getElementById('d-business');
    if (bizSel) {
      const companies = customers.filter(x => !d.dist || x.type === d.dist).map(x => x.company||x.contact).filter(Boolean).sort();
      const unique = [...new Set(companies)];
      bizSel.innerHTML = '<option value="">— 選擇公司 —</option>' +
        unique.map(co => '<option value="'+co+'"'+(d.business===co?' selected':'')+'>'+co+'</option>').join('');
    }
  }
  ['addr','city','zip','contact','phone','status','delivDate','wraps','parts','notes'].forEach(k => {
    const el = document.getElementById('d-'+k);
    if (el) el.value = d ? (d[k]||'') : (k==='status'?'待配送':'');
  });
  const addrSel = document.getElementById('d-addr-select');
  if (addrSel) addrSel.value = '';
  // Populate delivery items grid
  populateDelivItemsGrid(d);
  document.getElementById('deliveryModal').classList.add('open');
}
function openDeliveryEdit(id) { openDeliveryModal(deliveries.find(x => x.id === id)); }

async function saveDelivery() {
  const data = {};
  ['dist','business','addr','city','zip','contact','phone','status','delivDate','wraps','parts','notes'].forEach(k => {

function emptyState(icon, text, sub) {

}


// ==============================
// INVOICE
// ==============================
const INV_STATUS = {
  '未付款':   'badge-red',
  '部分付款': 'badge-amber',
  '已付清':   'badge-green',
};

function renderInvoiceStats() {
  const total  = invoices.reduce((s,i) => s + ((Number(i.qty)||0)*(Number(i.unitPrice)||0)), 0);
  const paid   = invoices.reduce((s,i) => s + (Number(i.paid)||0), 0);
  const unpaid = invoices.filter(i => i.status !== '已付清').length;
  const el = document.getElementById('invoice-stats');
  if (!el) return;
  el.innerHTML =
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--teal)">' + fmt$(total) + '</div><div class="stat-card-lbl">總發票金額</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--green)">' + fmt$(paid) + '</div><div class="stat-card-lbl">已收款</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--red)">' + fmt$(total - paid) + '</div><div class="stat-card-lbl">未收款</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--amber)">' + unpaid + '</div><div class="stat-card-lbl">待收發票</div></div>';
}

function renderInvoices() {
  renderInvoiceStats();
  const el = document.getElementById('invoice-list');
  if (!el) return;
  if (!invoices.length) { el.innerHTML = emptyState('🧾','尚無發票資料','點擊新增發票開始記錄'); return; }
  const sorted = [...invoices].sort((a,b) => {
    const o = {'未付款':0,'部分付款':1,'已付清':2};
    return (o[a.status]||0)-(o[b.status]||0);
  });
  let html = '';
  sorted.forEach(inv => {
    const total = (Number(inv.qty)||0)*(Number(inv.unitPrice)||0);
    const balance = total - (Number(inv.paid)||0);
    const pct = total > 0 ? Math.round((Number(inv.paid)||0)/total*100) : 0;
    html += '<div class="card invoice-card" onclick="openInvoiceEdit(\'' + inv.id + '\')">';
    html += '<div class="card-top"><div><div class="card-id">INV #' + (inv.num||'—') + ' · ' + fmtDate(inv.date) + '</div>';
    html += '<div class="card-title">' + (inv.billTo||'—') + '</div></div>';
    html += '<span class="badge ' + (INV_STATUS[inv.status]||'badge-muted') + '">' + (inv.status||'—') + '</span></div>';
    html += '<div class="card-grid">';
    if (inv.item)    html += '<div class="card-field"><div class="card-field-lbl">項目</div><div class="card-field-val">' + inv.item + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">數量</div><div class="card-field-val">' + (inv.qty||'—') + ' ' + (inv.unit||'') + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">總金額</div><div class="card-field-val" style="color:var(--teal)">' + fmt$(total) + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">未收餘額</div><div class="card-field-val" style="color:' + (balance>0?'var(--red)':'var(--green)') + '">' + fmt$(balance) + '</div></div>';
    html += '</div>';
    if (total > 0) html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + (pct===100?'var(--green)':'var(--teal)') + '"></div></div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderDeliveryStats() {

    '<div class="stat-card"><div class="stat-card-val" style="color:var(--blue)">' + scheduled + '</div><div class="stat-card-lbl">已排程</div></div>' +

function renderDeliveries() {
  renderDeliveryStats();
  const el = document.getElementById('delivery-list');
  if (!el) return;
  if (!deliveries.length) { el.innerHTML = emptyState('🚛','尚無配送地址','點擊新增地址開始管理'); return; }
  const sorted = [...deliveries].sort((a,b) => {
    const o = {'待配送':0,'已排程':1,'已配送':2};
    return (o[a.status]||0)-(o[b.status]||0);
  });
  let html = '';
  sorted.forEach(d => {
    html += '<div class="card delivery-card" onclick="openDeliveryEdit(\'' + d.id + '\')">';
    html += '<div class="card-top"><div>';
    html += '<div class="card-id">' + (d.dist||'') + (d.business&&d.business!==d.dist?' &middot; '+d.business:'') + '</div>';
    html += '<div class="card-title">' + (d.city||d.addr||'—') + '</div>';
    if (d.containerNum || d.bolNum) {
      const ctrs = (d.containerNum||'').split(',').map(x=>x.trim()).filter(Boolean);
      html += '<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">';
      ctrs.forEach(ct => { html += '<span style="font-family:var(--mono);font-size:0.7rem;background:var(--teal-dim);border:1px solid var(--teal);border-radius:4px;padding:2px 6px;color:var(--teal)">'+ct+'</span>'; });
      if (d.bolNum) html += '<span style="font-size:0.7rem;color:var(--text-dim);padding:2px 4px;font-family:var(--mono)">BOL: '+d.bolNum+'</span>';
      html += '</div>';
    }

    html += '</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">';
    html += '<span class="badge ' + (DEL_STATUS[d.status]||'badge-muted') + '">' + d.status + '</span>';
    html += '<button onclick="event.stopPropagation();toggleDelivered(\'' + d.id + '\')" class="delivery-check ' + (d.status==='已配送'?'delivered':'') + '" title="標記已配送">' + (d.status==='已配送'?'✓':'') + '</button>';
    html += '</div></div>';
    html += '<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:8px">📍 ' + (d.addr||'') + (d.city?', '+d.city:'') + ' ' + (d.zip||'') + '</div>';
    const shipRefD = d.bolNum ? cargo.find(s => String(s.bolNum||'').trim() === String(d.bolNum||'').trim()) : null;
    const inlandBol = shipRefD ? (shipRefD.ref_inlandBOL||'') : '';
    if (inlandBol) html += '<div style="font-size:0.75rem;color:var(--amber);margin-bottom:6px;font-family:var(--mono)">📄 Inland BOL: ' + inlandBol + '</div>';
    html += '<div class="card-grid">';
    if (d.contact)   html += '<div class="card-field"><div class="card-field-lbl">聯絡人</div><div class="card-field-val">' + d.contact + '</div></div>';
    if (d.phone)     html += '<div class="card-field"><div class="card-field-lbl">電話</div><div class="card-field-val">' + fmtPhone(d.phone) + '</div></div>';
    if (d.delivItems) {
      try {
        const items = JSON.parse(d.delivItems);
        Object.entries(items).forEach(([k,v]) => {
          if (v > 0) html += '<div class="card-field"><div class="card-field-lbl">' + k + '</div><div class="card-field-val">' + v + '</div></div>';
        });
      } catch(e) {
        if (d.wraps) html += '<div class="card-field"><div class="card-field-lbl">包膜</div><div class="card-field-val">' + d.wraps + ' 卷</div></div>';
        if (d.parts) html += '<div class="card-field"><div class="card-field-lbl">零件</div><div class="card-field-val">' + d.parts + ' 件</div></div>';
      }
    } else {
      if (d.wraps) html += '<div class="card-field"><div class="card-field-lbl">包膜</div><div class="card-field-val">' + d.wraps + ' 卷</div></div>';
      if (d.parts) html += '<div class="card-field"><div class="card-field-lbl">零件</div><div class="card-field-val">' + d.parts + ' 件</div></div>';
    }
    if (d.delivDate) html += '<div class="card-field"><div class="card-field-lbl">配送日期</div><div class="card-field-val">' + fmtDate(d.delivDate) + '</div></div>';
    html += '</div></div>';
  });
  el.innerHTML = html;
}

async function toggleDelivered(id) {
  const d = deliveries.find(x => x.id === id);
  if (!d) return;
  d.status = d.status === '已配送' ? '待配送' : '已配送';
  if (d.status === '已配送' && !d.delivDate) d.delivDate = new Date().toISOString().split('T')[0];
  renderDeliveries();
  await saveToSheet('Deliveries', d);
}

// ==============================
// TASKS
// ==============================
function getWeekMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d.toISOString().split('T')[0];
}

function renderTasks() {
  const el = document.getElementById('tasks-content');
  if (!el) return;
  if (!tasks.length) { el.innerHTML = emptyState('✅','尚無任務','點擊新增任務開始規劃'); return; }
  const weeks = {};
  tasks.forEach(t => {
    const w = t.week || getWeekMonday(new Date());
    if (!weeks[w]) weeks[w] = [];
    weeks[w].push(t);
  });
  const thisWeek = getWeekMonday(new Date());
  let html = '';
  Object.keys(weeks).sort().reverse().forEach(w => {
    const wDate = new Date(w+'T12:00:00');
    const wEnd  = new Date(wDate); wEnd.setDate(wEnd.getDate()+6);
    const label = wDate.toLocaleDateString('zh-TW',{month:'long',day:'numeric'}) + ' – ' + wEnd.toLocaleDateString('zh-TW',{month:'long',day:'numeric'});
    const wTasks = weeks[w].sort((a,b) => {const po={'緊急':0,'重要':1,'一般':2};return (po[a.priority]||2)-(po[b.priority]||2);});
    const done = wTasks.filter(t=>t.done).length;
    html += '<div style="font-family:var(--display);font-size:1rem;font-weight:700;color:var(--text);margin:20px 0 10px;display:flex;align-items:center;gap:8px">' + label;
    if (w === thisWeek) html += '<span style="font-size:0.7rem;font-weight:500;font-family:var(--sans);padding:2px 8px;border-radius:8px;background:var(--green-dim);color:var(--green)">本週</span>';
    html += '<span style="font-size:0.7rem;font-weight:500;font-family:var(--sans);padding:2px 8px;border-radius:8px;background:var(--surface3);color:var(--text-muted)">' + done + '/' + wTasks.length + '</span></div>';
    wTasks.forEach(t => {
      const pc = {'一般':'var(--text-muted)','重要':'var(--amber)','緊急':'var(--red)'};
      html += '<div class="task-item ' + (t.done?'done':'') + '">';
      html += '<div class="task-check ' + (t.done?'checked':'') + '" onclick="toggleTask(\'' + t.id + '\')"></div>';
      html += '<div class="task-content"><div class="task-text">' + t.text + '</div>';
      if (t.notes) html += '<div class="task-meta">' + t.notes + '</div>';
      html += '<div class="task-meta" style="color:' + (pc[t.priority]||'var(--text-muted)') + '">● ' + (t.priority||'一般') + '</div>';
      html += '</div><button class="task-del" onclick="deleteTask(\'' + t.id + '\')">✕</button></div>';
    });
  });
  el.innerHTML = html;
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks();
  await saveToSheet('Tasks', t);
}

async function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  renderTasks();
  await deleteFromSheet('Tasks', id);
}

function renderDashboard() {
  const today = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const dateEl = document.getElementById('dash-date');
  if (dateEl) dateEl.textContent = today;
  const unpaidAmt = invoices.filter(i => i.status !== '已付清')
    .reduce((s,i) => s + ((Number(i.qty)||0)*(Number(i.unitPrice)||0)) - (Number(i.paid)||0), 0);
  const activeCargo  = cargo.filter(c => c.status !== '已完成').length;
  const pendingDel   = deliveries.filter(d => d.status !== '已配送').length;
  const pendingTasks = tasks.filter(t => !t.done).length;
  const statsEl = document.getElementById('dash-stats');
  if (statsEl) statsEl.innerHTML =
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--blue)">' + activeCargo + '</div><div class="stat-card-lbl">進行中貨批</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--red)">' + fmt$(unpaidAmt) + '</div><div class="stat-card-lbl">未收款</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--purple)">' + pendingDel + '</div><div class="stat-card-lbl">待配送地點</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--amber)">' + pendingTasks + '</div><div class="stat-card-lbl">未完成任務</div></div>';
  const urgentCargo    = cargo.filter(c => { const d = daysFromNow(c.eta); return d!==null && d<=5 && c.status!=='已完成'; });
  const unpaidInv      = invoices.filter(i => i.status !== '已付清');
  const urgentTasks    = tasks.filter(t => !t.done && t.priority === '緊急');
  const pendingDelList = deliveries.filter(d => d.status !== '已配送');
  const gridEl = document.getElementById('dash-grid');
  if (!gridEl) return;
  let grid = '';
  grid += '<div class="dash-card"><div class="dash-card-title">🚢 近期到港貨批</div>';
  if (urgentCargo.length) urgentCargo.forEach(c => { grid += '<div class="dash-list-item"><span style="font-family:var(--mono);font-size:0.8rem">' + (c.bolNum||'BOL?') + '</span><span class="badge badge-blue" style="font-size:0.68rem">' + daysFromNow(c.eta) + '天後</span></div>'; });
  else grid += '<div style="color:var(--text-dim);font-size:0.82rem;padding:8px 0">近期無到港貨批</div>';
  grid += '</div>';
  grid += '<div class="dash-card"><div class="dash-card-title">🧾 待收款發票</div>';
  if (unpaidInv.length) unpaidInv.slice(0,5).forEach(i => {
    const bal = ((Number(i.qty)||0)*(Number(i.unitPrice)||0))-(Number(i.paid)||0);
    grid += '<div class="dash-list-item"><span>' + (i.billTo||'—') + ' #' + (i.num||'?') + '</span><span style="color:var(--red);font-family:var(--mono);font-size:0.8rem">' + fmt$(bal) + '</span></div>';
  });
  else grid += '<div style="color:var(--text-dim);font-size:0.82rem;padding:8px 0">所有發票已收款 ✓</div>';
  grid += '</div>';
  grid += '<div class="dash-card"><div class="dash-card-title">⚡ 緊急任務</div>';
  if (urgentTasks.length) urgentTasks.slice(0,5).forEach(t => { grid += '<div class="dash-list-item"><span style="font-size:0.82rem">' + t.text + '</span><span class="badge badge-red" style="font-size:0.65rem">緊急</span></div>'; });
  else grid += '<div style="color:var(--text-dim);font-size:0.82rem;padding:8px 0">無緊急任務</div>';
  grid += '</div>';
  grid += '<div class="dash-card"><div class="dash-card-title">🚛 待配送地點</div>';
  if (pendingDelList.length) pendingDelList.slice(0,5).forEach(d => { grid += '<div class="dash-list-item"><span style="font-size:0.82rem">' + (d.city||d.addr||'—') + (d.bolNum?' <span style="font-size:0.7rem;color:var(--blue)">'+d.bolNum+'</span>':'') + '</span><span class="badge ' + (DEL_STATUS[d.status]||'badge-muted') + '" style="font-size:0.65rem">' + d.status + '</span></div>'; });
  else grid += '<div style="color:var(--text-dim);font-size:0.82rem;padding:8px 0">無待配送地點</div>';
  grid += '</div>';
  gridEl.innerHTML = grid;
}


function renderAll() {
  const active = document.querySelector('.page.active')?.id?.replace('page-','');
  if (active === 'dashboard') renderDashboard();
  else if (active === 'cargo') renderCargo();
  else if (active === 'invoice') renderInvoices();
  else if (active === 'delivery') renderDeliveries();
  else if (active === 'tasks') renderTasks();
  else if (active === 'customers') renderCustomers();
  else if (active === 'settings') renderSettings();
  else if (active === 'inventory') renderInventory();
}

let editingCustomer = null;

function openCustomerModal(cu) {
  editingCustomer = cu || null;
  document.getElementById("customerModalTitle").textContent = cu ? "編輯客戶" : "新增客戶";
  document.getElementById("customerDeleteBtn").style.display = cu ? "block" : "none";

  Object.keys(defs).forEach(k => {

  });

function openCustomerEdit(id) { openCustomerModal(customers.find(x => x.id === id)); }

async function saveCustomer() {
  const data = {};
  ["company","contact","type","phone","email","addr","city","zip","terms","status","notes"].forEach(k => {
    data[k] = document.getElementById("cu-"+k)?.value || "";
  });
  if (!data.company && !data.contact) { alert("請輸入公司名稱或聯絡人"); return; }
  const record = editingCustomer ? {...editingCustomer,...data} : {id:uid(),...data};
  closeModal("customerModal");
  const ok = await saveToSheet("Customers", record);
  if (ok) await loadAll();
}

async function deleteCustomer() {
  if (!editingCustomer || !confirm("確定刪除此客戶？")) return;
  closeModal("customerModal");
  const ok = await deleteFromSheet("Customers", editingCustomer.id);
  if (ok) await loadAll();
}

function addListItem(key) {
  const input = document.getElementById('new-' + key);
  const val = (input?.value || '').trim();
  if (!val) { if (input) input.focus(); return; }
  const lists = getLists();
  if (!lists[key]) lists[key] = [];
  if (!lists[key].includes(val)) {
    lists[key].push(val);
    lists[key].sort();
    saveLists(lists);
  }
  input.value = '';
  renderSettings();
}

function addProduct() {
  const name = prompt('產品名稱:');
  if (!name || !name.trim()) return;
  const unit = prompt('單位 (e.g. Rolls, Pieces, Units):', 'Units');
  if (unit === null) return;
  const cat  = prompt('類別 (e.g. 包膜, 零件, 原料, 其他):', '其他');
  if (cat === null) return;
  const prods = getProducts();
  prods.push({ name: name.trim(), unit: (unit||'Units').trim(), category: (cat||'其他').trim() });
  saveProducts(prods);
  renderSettings();
}

function editProduct(idx) {
  const prods = getProducts();
  const p = prods[idx];
  if (!p) return;
  const name = prompt('產品名稱:', p.name);
  if (name === null) return;
  const unit = prompt('單位:', p.unit);
  if (unit === null) return;
  const cat  = prompt('類別:', p.category);
  if (cat === null) return;
  prods[idx] = { name: name.trim()||p.name, unit: unit.trim()||p.unit, category: cat.trim()||p.category };
  saveProducts(prods);
  renderSettings();
}

function deleteProduct(idx) {
  const prods = getProducts();
  if (!confirm('確定刪除「' + prods[idx]?.name + '」？')) return;
  prods.splice(idx, 1);
  saveProducts(prods);
  renderSettings();
}

function editListItem(key, oldVal) {
  const newVal = prompt('編輯選項:', oldVal);
  if (!newVal || newVal.trim() === oldVal) return;
  const lists = getLists();
  const idx = lists[key].indexOf(oldVal);
  if (idx !== -1) {
    lists[key][idx] = newVal.trim();
    saveLists(lists);
    renderSettings();
  }
}

function removeListItem(key, val) {
  const lists = getLists();
  lists[key] = lists[key].filter(x => x !== val);
  saveLists(lists);
  renderSettings();
}

function resetLists() {
  if (!confirm('確定還原所有預設選項？自訂義的選項會被刪除。')) return;
  localStorage.removeItem('wg_lists');
  renderSettings();
}

function uniqVals(arr, key) {
  return [...new Set(arr.map(x => x[key]).filter(Boolean))].sort();
}

function buildOptions(values, current, placeholder) {
  let html = placeholder ? '<option value="">' + placeholder + '</option>' : '';
  values.forEach(v => {
    html += '<option value="' + v + '"' + (v === current ? ' selected' : '') + '>' + v + '</option>';
  });
  return html;
}

function populateSelect(id, values, current, placeholder) {
  const el = document.getElementById(id);
  if (!el) return;
  if (current && !values.includes(current)) values = [current, ...values];
  el.innerHTML = buildOptions(values, current, placeholder);
}

    try { saved = JSON.parse(d.delivItems); } catch(e) { saved = {}; }
  }
  if (d && d.wraps && !saved['Cotton Wrap']) saved['Cotton Wrap'] = d.wraps;
  grid.innerHTML = prods.map(p => {
    const safeId = 'ditem-' + p.name.replace(/[^a-zA-Z0-9]/g,'_');
    const val = saved[p.name] || '';
    return '<div style="display:flex;flex-direction:column;gap:4px">' +
      '<label style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em">' + p.name + ' <span style="font-weight:400;color:var(--text-dim)">(' + p.unit + ')</span></label>' +
      '<input type="number" id="' + safeId + '" value="' + val + '" placeholder="0" min="0" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--sans);font-size:0.875rem;color:var(--text);outline:none">' +
      '</div>';
  }).join('');
}

function getDelivItemsData() {
  const prods = getProducts();
  const result = {};
  prods.forEach(p => {
    const safeId = 'ditem-' + p.name.replace(/[^a-zA-Z0-9]/g,'_');
    const el = document.getElementById(safeId);
    const val = Number(el?.value)||0;
    if (val > 0) result[p.name] = val;
  });
  return result;
}

function onCompanyChange() {
  const companyVal = (document.getElementById('d-business')?.value || '').trim().toLowerCase();
  if (!companyVal) return;
  const cust = customers.find(x => (x.company||x.contact||'').trim().toLowerCase() === companyVal);
  if (!cust) return;
  const fset = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  fset('d-addr',    cust.addr);
  fset('d-city',    cust.city);
  fset('d-zip',     cust.zip);
  fset('d-contact', cust.contact);
  fset('d-phone',   cust.phone);
}

// ==============================
// INVENTORY
// ==============================
function renderInventory() {
  const prods = getProducts();
  const sEl = document.getElementById('inventory-stats');
  const cEl = document.getElementById('inventory-content');
  if (!sEl || !cEl) return;

  // Stats
  const totalIn  = cargo.reduce((s,sh) => s + (Number(sh.qty)||0), 0);
  const inTransit = cargo.filter(s => s.status !== '已完成').length;
  const totalSoldAmt = invoices.reduce((s,i) => s + ((Number(i.qty)||0)*(Number(i.unitPrice)||0)), 0);
  const totalPaidAmt = invoices.reduce((s,i) => s + (Number(i.paid)||0), 0);
  sEl.innerHTML =
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--blue)">' + totalIn.toLocaleString() + '</div><div class="stat-card-lbl">總進貨量</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--amber)">' + inTransit + '</div><div class="stat-card-lbl">週途中貨批</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--teal)">' + fmt$(totalSoldAmt) + '</div><div class="stat-card-lbl">總銷售額</div></div>' +
    '<div class="stat-card"><div class="stat-card-val" style="color:var(--red)">' + fmt$(totalSoldAmt-totalPaidAmt) + '</div><div class="stat-card-lbl">待收款</div></div>';

  let html = '';
  prods.forEach(prod => {
    const pnl = prod.name.toLowerCase();

    // Incoming: from cargo QTY where disc matches product
    const inQty = cargo
      .filter(s => s.disc && s.disc.toLowerCase().includes(pnl))
      .reduce((s,sh) => s + (Number(sh.qty)||0), 0);

    // Delivered: from delivItems JSON
    let delivQty = 0;
    deliveries.forEach(d => {
      if (d.delivItems) {
        try {
          const it = JSON.parse(d.delivItems);
          Object.entries(it).forEach(([k,v]) => { if (k.toLowerCase().includes(pnl)) delivQty += Number(v)||0; });
        } catch(e) {}
      }
      if (prod.name === 'Cotton Wrap' && d.wraps && !d.delivItems) delivQty += Number(d.wraps)||0;
    });

    const remaining = inQty - delivQty;

    // Sales from invoices
    const relInv = invoices.filter(i => i.item && i.item.toLowerCase().includes(pnl));
    const soldAmt = relInv.reduce((s,i) => s + ((Number(i.qty)||0)*(Number(i.unitPrice)||0)), 0);
    const paidAmt = relInv.reduce((s,i) => s + (Number(i.paid)||0), 0);

    // Per-customer
    const custMap = {};
    relInv.forEach(i => {
      const k = i.billTo || '未知';
      if (!custMap[k]) custMap[k] = {qty:0, amt:0};
      custMap[k].qty += Number(i.qty)||0;
      custMap[k].amt += (Number(i.qty)||0)*(Number(i.unitPrice)||0);
    });

    html += '<div class="card" style="margin-bottom:12px">';
    html += '<div class="card-top"><div>';
    html += '<div class="card-title">' + prod.name + '</div>';
    html += '<div class="card-id">' + prod.unit + ' &middot; ' + prod.category + '</div>';
    html += '</div></div>';

    // Main stats grid
    html += '<div class="card-grid" style="margin-top:10px">';
    html += '<div class="card-field"><div class="card-field-lbl">進貨量</div><div class="card-field-val" style="color:var(--blue)">' + inQty.toLocaleString() + ' ' + prod.unit + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">已配送</div><div class="card-field-val" style="color:var(--green)">' + delivQty.toLocaleString() + ' ' + prod.unit + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">剰餘庫存</div><div class="card-field-val" style="color:' + (remaining>0?'var(--teal)':remaining<0?'var(--red)':'var(--text-muted)') + ';font-weight:700">' + remaining.toLocaleString() + ' ' + prod.unit + '</div></div>';
    html += '<div class="card-field"><div class="card-field-lbl">待收款</div><div class="card-field-val" style="color:' + (soldAmt-paidAmt>0?'var(--red)':'var(--green)') + '">' + fmt$(soldAmt-paidAmt) + '</div></div>';
    html += '</div>';

    // Stock bar
    if (inQty > 0) {
      const pct = Math.min(100, Math.round(delivQty/inQty*100));
      html += '<div style="margin-top:10px">';
      html += '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);margin-bottom:4px"><span>配送進度</span><span>' + pct + '%</span></div>';
      html += '<div style="height:6px;background:var(--surface3);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:' + (pct>=100?'var(--green)':'var(--teal)') + ';width:' + pct + '%"></div></div>';
      html += '</div>';
    }

    // Per-customer breakdown
    if (Object.keys(custMap).length) {
      const totalCustQty = Object.values(custMap).reduce((s,v)=>s+v.qty,0);
      html += '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">';
      html += '<div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">客戶分析</div>';
      Object.entries(custMap).sort((a,b)=>b[1].qty-a[1].qty).forEach(([cust,data]) => {
        const pct = totalCustQty > 0 ? Math.round(data.qty/totalCustQty*100) : 0;
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
        html += '<div style="font-size:0.82rem;min-width:140px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + cust + '</div>';
        html += '<div style="flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--teal);border-radius:3px;width:'+pct+'%"></div></div>';
        html += '<div style="font-size:0.75rem;font-family:var(--mono);color:var(--text-muted);min-width:70px;text-align:right">' + data.qty.toLocaleString() + ' ' + prod.unit + '</div>';
        html += '<div style="font-size:0.75rem;font-family:var(--mono);color:var(--teal);min-width:80px;text-align:right">' + fmt$(data.amt) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  cEl.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text-muted)">請先在『設定』建立產品清單，再從貨批引入資料</div>';
}


// ── INIT ──
renderDashboard(); // show empty dashboard immediately
loadAll();        // then load data and re-render
</script>
